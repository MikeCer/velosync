services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    environment:
      - MEDIA_FOLDER=/app/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  media_data:
